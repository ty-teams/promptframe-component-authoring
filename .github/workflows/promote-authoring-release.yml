name: Promote authoring release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Receipt-bound execution mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - proof
          - latest

permissions:
  contents: read

concurrency:
  group: promptframe-authoring-promotion
  cancel-in-progress: false

jobs:
  promote:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-promotion
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Verify trusted checkout and receipt
        env:
          PROMPTFRAME_AUTHORING_PROMOTION_MODE: ${{ inputs.mode }}
        run: node scripts/authoring-promotion-workflow-guard.mjs
      - name: Execute bounded promotion
        env:
          PROMPTFRAME_AUTHORING_PROMOTION_MODE: ${{ inputs.mode }}
          NPM_DIST_TAG_PROMOTION_TOKEN: ${{ inputs.mode == 'dry-run' && '' || secrets.NPM_DIST_TAG_PROMOTION_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/authoring-promotion-executor.mjs \
            | tee "$RUNNER_TEMP/authoring-promotion-result.json"
      - name: Remove credential material
        if: always()
        shell: bash
        run: |
          rm -rf "$RUNNER_TEMP"/promptframe-promotion-*
          test ! -e "$HOME/.npmrc"
