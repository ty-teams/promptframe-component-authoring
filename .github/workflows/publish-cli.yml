name: Publish CLI

on:
  push:
    tags:
      - 'authoring-release-*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: promptframe-authoring-release-cli-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'ty-teams/promptframe-component-authoring'
    runs-on: ubuntu-latest
    environment: npm-production
    env:
      PROMPTFRAME_AUTHORING_RELEASE_PACKAGE_KEY: cli
      PROMPTFRAME_AUTHORING_RELEASE_ARTIFACT_ROOT: ${{ runner.temp }}/promptframe-authoring-release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Verify release authorization
        id: release-plan
        env:
          PROMPTFRAME_AUTHORING_RELEASE_PLAN_ONLY: 'true'
        run: node scripts/authoring-release-publish.mjs
      - name: Download immutable candidate cohort
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ steps.release-plan.outputs.artifact_tag }}" --dir "$PROMPTFRAME_AUTHORING_RELEASE_ARTIFACT_ROOT" --pattern candidate-manifest.json --pattern '*.tgz'
      - name: Publish authorized package with OIDC
        run: node scripts/authoring-release-publish.mjs
      - name: Remove release artifacts
        if: always()
        run: rm -rf "$PROMPTFRAME_AUTHORING_RELEASE_ARTIFACT_ROOT"
