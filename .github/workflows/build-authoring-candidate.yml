name: Build authoring candidate

on:
  push:
    tags:
      - 'authoring-candidate-*'

permissions:
  contents: write

concurrency:
  group: promptframe-authoring-candidate-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  candidate:
    if: github.repository == 'ty-teams/promptframe-component-authoring'
    runs-on: ubuntu-latest
    environment: npm-production
    env:
      PROMPTFRAME_AUTHORING_CANDIDATE_OUTPUT: ${{ runner.temp }}/promptframe-authoring-candidate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@10.30.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:public
      - run: pnpm -r lint
      - run: pnpm -r test
      - run: pnpm -r build
      - name: Build immutable candidate artifacts
        run: node scripts/authoring-release-candidate.mjs
      - name: Refuse candidate asset replacement
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "authoring_release.candidate_release_exists" >&2
            exit 1
          fi
      - name: Create no-clobber candidate prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "$PROMPTFRAME_AUTHORING_CANDIDATE_OUTPUT/candidate-manifest.json" \
            "$PROMPTFRAME_AUTHORING_CANDIDATE_OUTPUT"/*.tgz \
            --verify-tag \
            --prerelease \
            --title "$GITHUB_REF_NAME" \
            --notes "Immutable PromptFrame authoring candidate. Not an npm stable release."
      - name: Remove candidate workspace
        if: always()
        shell: bash
        run: rm -rf "$PROMPTFRAME_AUTHORING_CANDIDATE_OUTPUT"
